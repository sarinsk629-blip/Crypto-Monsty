<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Institutional Nexus V6.0</title>
    <link rel="stylesheet" href="./css/institutional-cockpit-v5.css">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script>
        window.BACKEND_URL = "https://phoenix-backend-6h1n.onrender.com";
        window.BRIDGE_URL = "https://phoenix-bridge.onrender.com";
        window.BRIDGE_WS_URL = "wss://phoenix-bridge.onrender.com/ws/signals";
    </script>
    <style>
        /* Physical Dashboard Architecture */
        body { margin: 0; background: #050914; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        .nexus-grid { display: grid; grid-template-rows: 50px 1fr 200px; height: 100vh; }
        .nexus-header { border-bottom: 1px solid #1a2a44; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #0a1128; }
        .nexus-main { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #1a2a44; }
        .nexus-pane { background: #050914; padding: 15px; position: relative; }
        .pane-title { position: absolute; top: 0; left: 0; background: #00ffcc; color: #000; padding: 2px 10px; font-weight: bold; font-size: 12px; }
        .nexus-terminal { background: #000; border-top: 1px solid #1a2a44; padding: 15px; overflow-y: auto; color: #00ff00; }
    </style>
</head>
<body>
    <div id="app-root" class="nexus-grid">
        <div class="nexus-header">
            <h2>⚡ PHOENIX NEXUS V6.0</h2>
            <div style="display:flex; gap:15px;">
                <span id="backend-status">🔴 Backend</span>
                <span id="bridge-status">🔴 Bridge</span>
            </div>
        </div>
        <div class="nexus-main">
            <div class="nexus-pane" id="widget-execution">
                <div class="pane-title">EXECUTION ALGO ROUTER</div>
                <div id="exec-content" style="margin-top:20px;">Awaiting telemetry...</div>
            </div>
            <div class="nexus-pane" id="widget-anomaly">
                <div class="pane-title">ML ANOMALY RADAR</div>
                <div id="radar-content" style="margin-top:20px;">Scanning orderbook...</div>
            </div>
        </div>
        <div class="nexus-terminal" id="sys-terminal">
            > Infrastructure initialized.<br>
            > JavaScript Engine: ONLINE.<br>
            > Igniting AppShell...<br>
        </div>
    </div>

    <script type="module">
        const term = document.getElementById('sys-terminal');
        const log = (msg) => term.innerHTML += '> ' + msg + '<br>';
        
        import('./js/app/appShell.js')
            .then(module => {
                const exportedKeys = Object.keys(module);
                if (exportedKeys.length > 0) {
                    const AppClass = module[exportedKeys[0]];
                    window.cockpit = new AppClass(document.getElementById('app-root'));
                    log('<span style="color:#00ffcc">🔥 AppShell Synced to Physical UI!</span>');
                    
                    if(window.cockpit.render) window.cockpit.render();
                    if(window.cockpit.init) window.cockpit.init();
                }
            })
            .catch(err => {
                log('<span style="color:red">🚨 CRASH: ' + err.message + '</span>');
            });
    </script>

    <script>
        // ⚡ THE DEFIBRILLATOR: Hardwired Telemetry Override
        setTimeout(() => {
            const term = document.getElementById('sys-terminal');
            const termLog = (msg) => { if(term) term.innerHTML += '> ' + msg + '<br>'; term.scrollTop = term.scrollHeight; };
            
            termLog('<span style="color:#00ffcc">Initiating Direct Telemetry Override...</span>');
            
            // 1. Force connection to Node.js Backend
            try {
                const backWsUrl = window.BACKEND_URL.replace('http', 'ws');
                termLog('Connecting to Node Aggregator: ' + backWsUrl);
                
                const backWs = new WebSocket(backWsUrl);
                backWs.onopen = () => {
                    document.getElementById('backend-status').innerHTML = '🟢 Backend [LIVE]';
                    document.getElementById('exec-content').innerHTML = '<span style="color:#0f0">Connection Established. Awaiting market ticks...</span>';
                    termLog('<span style="color:#0f0">🟢 Node.js Aggregator Connected</span>');
                };
                backWs.onmessage = (e) => {
                    document.getElementById('exec-content').innerHTML = '<div style="color:#0f0; word-break: break-all;"><b>TICK:</b> ' + e.data.substring(0, 150) + '</div>';
                };
                backWs.onerror = () => termLog('<span style="color:#ffaa00">Backend WS connection rejected. (Check if server requires specific /ws path)</span>');
            } catch(e) { termLog('<span style="color:red">Backend Error: ' + e.message + '</span>'); }

            // 2. Force connection to Python ML Bridge
            try {
                termLog('Connecting to Python Bridge: ' + window.BRIDGE_WS_URL);
                const bridgeWs = new WebSocket(window.BRIDGE_WS_URL);
                bridgeWs.onopen = () => {
                    document.getElementById('bridge-status').innerHTML = '🟢 Bridge [LIVE]';
                    document.getElementById('radar-content').innerHTML = '<span style="color:#0f0">Radar Online. Scanning for anomalies...</span>';
                    termLog('<span style="color:#0f0">🟢 Python ML Bridge Connected</span>');
                };
                bridgeWs.onmessage = (e) => {
                    document.getElementById('radar-content').innerHTML = '<div style="color:#0f0; word-break: break-all;"><b>ANOMALY:</b> ' + e.data.substring(0, 150) + '</div>';
                };
                bridgeWs.onerror = () => termLog('<span style="color:#ffaa00">Bridge WS connection rejected.</span>');
            } catch(e) { termLog('<span style="color:red">Bridge Error: ' + e.message + '</span>'); }
            
        }, 1500); // Wait 1.5s for UI to render before striking
    </script>
    
</body>
</html>

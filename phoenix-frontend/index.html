<!DOCTYPE html>
<html>
<head>
    <title>Phoenix Nexus V6.0</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #050914; color: #00ffcc; font-family: 'Courier New', monospace; }
        .nexus-grid { display: grid; grid-template-rows: 50px 1fr 200px; height: 100vh; }
        .nexus-main { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #1a2a44; }
        .nexus-terminal { background: #000; color: #00ff00; padding: 10px; overflow-y: scroll; }
    </style>
</head>
<body>
    <div class="nexus-grid">
        <header>⚡ PHOENIX NEXUS V6.0 <span id="status">🔴 Disconnected</span></header>
        <div class="nexus-main">
            <div id="exec">Awaiting telemetry...</div>
            <div id="radar">Scanning orderbook...</div>
        </div>
        <div class="nexus-terminal" id="term"></div>
    </div>

    <script>
        const term = document.getElementById('term');
        function log(msg) { term.innerHTML += '> ' + msg + '<br>'; term.scrollTop = term.scrollHeight; }
        
        // Final attempt at direct connection
        try {
            const socket = io("https://phoenix-backend-6h1n.onrender.com", { transports: ['websocket'] });
            socket.on('connect', () => {
                document.getElementById('status').innerText = '🟢 LIVE';
                log('Connected to Backend!');
            });
            socket.on('message', (d) => log('TICK: ' + JSON.stringify(d).substring(0,50)));
        } catch(e) {
            log('CRITICAL: ' + e.message);
        }
    </script>
</body>
</html>
